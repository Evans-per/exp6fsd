<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg) 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2 { font-weight: 700; margin-bottom: 1.5rem; }
        h1 { font-size: 1.8rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        input, select {
            width: 100%; padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; color: white; font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        button {
            width: 100%; padding: 1rem; border: none; border-radius: 10px;
            background: var(--primary); color: white; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.5); }

        .summary { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .total-amount { font-size: 2rem; font-weight: 700; color: var(--accent); }

        .expense-list { max-height: 400px; overflow-y: auto; padding-right: 0.5rem; }
        .expense-list::-webkit-scrollbar { width: 6px; }
        .expense-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .expense-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem; border-radius: 12px; margin-bottom: 0.8rem;
            transition: all 0.3s;
        }
        .expense-item:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }

        .cat-icon { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 10px; background: rgba(99, 102, 241, 0.2); color: var(--primary); margin-right: 1rem; font-size: 1.2rem; font-weight: bold;}
        .item-info { display: flex; align-items: center; }
        .item-details h3 { margin: 0; font-size: 1rem; font-weight: 600; }
        .item-details p { margin: 0; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
        .item-actions { display: flex; align-items: center; gap: 1rem; }
        .item-amount { font-weight: 700; font-size: 1.1rem; }
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; box-shadow: none; }
        .delete-btn:hover { background: var(--danger); color: white; transform: scale(1.1); }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Input Form -->
        <div class="glass-card">
            <h1>➕ Add Expense</h1>
            <form id="expenseForm">
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount" placeholder="e.g. 500" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Travel">🚗 Travel</option>
                        <option value="Bills">💡 Bills</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Other">✨ Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit">Record Expense</button>
            </form>
        </div>

        <!-- Dashboard / List -->
        <div class="glass-card" style="display: flex; flex-direction: column;">
            <div class="summary">
                <div>
                    <h2>Total Expenses</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Your spending history</p>
                </div>
                <div class="total-amount" id="totalAmount">₹0</div>
            </div>
            <div class="expense-list" id="expenseList">
                <!-- Items injected here by JS -->
                <p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">Loading expenses...</p>
            </div>
        </div>
    </div>

    <script>
        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();

        const form = document.getElementById('expenseForm');
        const listEl = document.getElementById('expenseList');
        const totalEl = document.getElementById('totalAmount');

        async function fetchExpenses() {
            try {
                const res = await fetch('/api/expenses');
                const data = await res.json();
                renderExpenses(data.expenses, data.totalExpense);
            } catch (error) {
                console.error("Failed to load", error);
                listEl.innerHTML = '<p style="color: red; text-align: center;">Failed to load data. Make sure backend is connected.</p>';
            }
        }

        function renderExpenses(expenses, total) {
            totalEl.innerText = `₹${total.toLocaleString()}`;
            listEl.innerHTML = '';
            
            if (expenses.length === 0) {
                listEl.innerHTML = '<p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">No expenses recorded yet.</p>';
                return;
            }

            expenses.forEach(exp => {
                const div = document.createElement('div');
                div.className = 'expense-item';
                div.innerHTML = `
                    <div class="item-info">
                        <div class="cat-icon">${exp.category.charAt(0)}</div>
                        <div class="item-details">
                            <h3>${exp.category}</h3>
                            <p>${new Date(exp.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</p>
                        </div>
                    </div>
                    <div class="item-actions">
                        <span class="item-amount">₹${exp.amount.toLocaleString()}</span>
                        <button class="delete-btn" onclick="deleteExpense('${exp._id}')">✕</button>
                    </div>
                `;
                listEl.appendChild(div);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                amount: Number(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                date: document.getElementById('date').value
            };

            const btn = form.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'adding...';
            
            await fetch('/api/expenses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            btn.innerText = originalText;
            fetchExpenses();
        });

        async function deleteExpense(id) {
            if(!confirm('Delete this expense?')) return;
            await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
            fetchExpenses();
        }

        // Init
        fetchExpenses();
    </script>
</body>
</html>
